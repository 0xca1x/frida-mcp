name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} --extra dev pytest -m "not real_frida and not android_emulator and not ios_simulator and not docker_vm" -rx

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv run --python 3.11 --extra dev python -m build

      - name: Check distributions
        run: uv run --python 3.11 --extra dev twine check dist/*

      - name: Check wheel contents
        shell: bash
        run: |
          python -m zipfile -l dist/*.whl
          ! python -m zipfile -l dist/*.whl | grep -E '(__pycache__|\.pyc|tools/frida\.py|uv\.lock)'
